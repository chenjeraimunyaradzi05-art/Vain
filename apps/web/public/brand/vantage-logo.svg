      <stop offset="0%" style="stop-color:#5d60e3;stop-opacity:1" />
      <stop offset="55%" style="stop-color:#cb3e84;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />

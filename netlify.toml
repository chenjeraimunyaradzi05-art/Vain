[build]
  base = "/"
  command = "cd apps/web && npm run build"

[build.environment]
  NODE_VERSION = "22"
  NPM_VERSION = "10"
  NEXT_PUBLIC_API_URL = "https://api.vantageplatform.com"
  NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY = "pk_test_placeholder"
  NEXT_PUBLIC_LIVEKIT_URL = "wss://livekit.vantageplatform.com"

[dev]
  command = "cd apps/web && npm run dev"
  port = 3000
  targetPort = 3000


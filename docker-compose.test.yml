version: '3.8'

services:
  # PostgreSQL Test Database
  postgres-test:
    image: postgres:15
    container_name: vantage-postgres-test
    environment:
      POSTGRES_DB: vantage_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
      - ./apps/api/prisma/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - vantage-test-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Test Instance
  redis-test:
    image: redis:7-alpine
    container_name: vantage-redis-test
    ports:
      - "6380:6379"
    volumes:
      - redis_test_data:/data
    networks:
      - vantage-test-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO Test Instance (for S3-compatible storage)
  minio-test:
    image: minio/minio:latest
    container_name: vantage-minio-test
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9001:9000"
      - "9002:9001"
    volumes:
      - minio_test_data:/data
    networks:
      - vantage-test-network
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Test API Service
  api-test:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.test
    container_name: vantage-api-test
    environment:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@postgres-test:5432/vantage_test
      REDIS_URL: redis://redis-test:6379
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin123
      AWS_S3_BUCKET: vantage-test
      AWS_S3_REGION: us-east-1
      AWS_S3_ENDPOINT: http://minio-test:9000
      JWT_SECRET: test-jwt-secret-for-testing-at-least-32-chars
      SES_TEST_CAPTURE: '1'
    ports:
      - "3334:3333"
    depends_on:
      postgres-test:
        condition: service_healthy
      redis-test:
        condition: service_healthy
      minio-test:
        condition: service_healthy
    networks:
      - vantage-test-network
    volumes:
      - ./apps/api:/app
      - /app/node_modules
    command: npm run test:watch

  # Test Web Service
  web-test:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.test
    container_name: vantage-web-test
    environment:
      NODE_ENV: test
      NEXT_PUBLIC_API_URL: http://localhost:3334
      NEXT_PUBLIC_WS_URL: ws://localhost:3334
    ports:
      - "3001:3000"
    depends_on:
      - api-test
    networks:
      - vantage-test-network
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    command: npm run test:watch

  # Test Mobile Service
  mobile-test:
    build:
      context: ./apps/mobile
      dockerfile: Dockerfile.test
    container_name: vantage-mobile-test
    environment:
      NODE_ENV: test
      EXPO_PUBLIC_API_URL: http://localhost:3334
      EXPO_PUBLIC_WS_URL: ws://localhost:3334
    ports:
      - "8082:8081"
    depends_on:
      - api-test
    networks:
      - vantage-test-network
    volumes:
      - ./apps/mobile:/app
      - /app/node_modules
    command: npm run test

  # Test Coverage Reporter
  coverage-reporter:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.test
    container_name: vantage-coverage-reporter
    environment:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@postgres-test:5432/vantage_test
      REDIS_URL: redis://redis-test:6379
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin123
      AWS_S3_BUCKET: vantage-test
      AWS_S3_REGION: us-east-1
      AWS_S3_ENDPOINT: http://minio-test:9000
      JWT_SECRET: test-jwt-secret-for-testing-at-least-32-chars
    depends_on:
      postgres-test:
        condition: service_healthy
      redis-test:
        condition: service_healthy
      minio-test:
        condition: service_healthy
    networks:
      - vantage-test-network
    volumes:
      - ./apps/api:/app
      - ./coverage:/app/coverage
      - /app/node_modules
    command: npm run test:coverage

volumes:
  postgres_test_data:
  redis_test_data:
  minio_test_data:

networks:
  vantage-test-network:
    driver: bridge
